        Customer must be linked to a StRails user. Requires `transfers:write` and `Idempotency-Key`.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sellToken, buyToken, amount]
              properties:
                customerId:
                  type: string
                  format: uuid
                sellToken:
                  type: string
                  enum: [CNGN, USDC, USDT]
                buyToken:
                  type: string
                  enum: [CNGN, USDC, USDT]
                amount:
                  type: number
                slippage:
                  type: number
                smartWalletAddress:
                  type: string
                destinationAddress:
                  type: string
            example:
              sellToken: CNGN
              buyToken: USDC
              amount: 5000
      responses:
        "201":
          description: Rails swap created
        "422":
          description: Customer not linked to StRails

