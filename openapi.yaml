  /swaps:
    get:
      operationId: listSwaps
      summary: List swaps
      description: Returns up to 50 swaps for your organisation, newest first. Optionally filter by `customerId`. Requires `transfers:read` scope.
      tags: [Swaps]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerIdQuery"
      responses:
        "200":
          description: Swaps fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          swaps:
                            type: array
                            items:
                              $ref: "#/components/schemas/Swap"
                          total:
                            type: integer
              examples:
                success:
                  $ref: "#/components/examples/ListSwapsResponse"
    post:
      operationId: createSwap
      summary: Create swap
      description: |
        Creates a Solana EURC↔USDC swap via Relay and returns a deposit address.
        RemitFlex does not custody funds. Deposit the `from` token to `depositAddress` before expiry.
        `refundTo` is always required. Tied to `customerId` (defaults to org primary customer).
        Requires `transfers:write` scope and an `Idempotency-Key` header.
      tags: [Swaps]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSwapRequest"
      x-codeSamples:
        - lang: bash
          label: curl
          source: |
            curl -X POST https://api.remitflex.io/v1/swaps \
              -H "Authorization: Bearer $REMITFLEX_API_KEY" \
              -H "Idempotency-Key: $(uuidgen)" \
              -H "Content-Type: application/json" \
              -d '{"from":"USDC","to":"EURC","amount":100,"tradeType":"exact_input","destinationAddress":"2dudFU32c5wsRpfRZDXBAJFirHC4hindqpKSCwwtDaAB","refundTo":"2dudFU32c5wsRpfRZDXBAJFirHC4hindqpKSCwwtDaAB"}'
      responses:
        "201":
          description: Swap created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Swap"
              examples:
                success:
                  $ref: "#/components/examples/CreateSwapResponse"
        "400":
          description: Missing Idempotency-Key
          content:
            application/json:
              examples:
                error:
                  value:
                    status: error
                    message: Idempotency-Key header is required for API key requests
        "422":
          description: Validation error or unsupported pair
          content:
            application/json:
              examples:
                error:
                  value:
                    status: error
                    message: Unsupported currency pair

