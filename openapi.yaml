      description: Unified ledger of payment-route deposits and swaps. Optionally filter by `customerId`. Requires `transfers:read` scope.
      tags: [Transactions]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerIdQuery"
      responses:
        "200":
          description: Transactions fetched
          content:
            application/json:
              examples:
