                    properties:
                      data:
                        type: object
                        properties:
                          chain: { type: string, example: solana }
                          provider: { type: string, example: relay }
                          updatedAt: { type: string, nullable: true }
                          rates: { type: array, items: { type: object } }
              examples:
                success:
                  $ref: "#/components/examples/ListRatesResponse"
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              examples:
                error:
                  $ref: "#/components/examples/ErrorResponse"
        "403":
          description: Missing required scope

