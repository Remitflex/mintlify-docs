      tags: [Rates]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: from
          in: path
          required: true
          schema:
            type: string
            enum: [USDC, EURC]
          example: USDC
        - name: to
          in: path
          required: true
          schema:
            type: string
            enum: [USDC, EURC]
          example: EURC
        - name: amount
          in: query
          required: false
          schema:
            type: number
          description: Probe amount (human decimal)
        - name: tradeType
          in: query
          required: false
          schema:
            type: string
            enum: [exact_input, exact_output]
            default: exact_input
