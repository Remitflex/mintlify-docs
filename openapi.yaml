openapi: 3.1.0
info:
  title: Remitflex API
  version: 1.0.0
  description: |
    Programmatic access to Remitflex payment routes, fiat rates, customers, and transactions.

    **Dashboard:** Create API keys at https://dashboard.remitflex.io

    **Authentication:** Send your API key as `Authorization: Bearer rmf_live_...` or `rmf_test_...`.

    **Idempotency:** Mutating requests (`POST`, `PUT`, `PATCH`, `DELETE`) require an `Idempotency-Key` header when authenticated with an API key.

servers:
  - url: http://localhost:4000/v1
    description: Local development
  - url: https://api.remitflex.io/v1
    description: Production

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: |
        API key created in the Remitflex Dashboard at dashboard.remitflex.io (`rmf_live_...` or `rmf_test_...`).
        Key management endpoints require a dashboard JWT and are not part of this reference.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique key for safe retries on mutating API-key requests. Cached for 24 hours per org, method, and path.
      schema:
        type: string
        maxLength: 255
        example: 7f3c2a1b-4e5d-6c7b-8a9f-0e1d2c3b4a5f

    CustomerIdQuery:
      name: customerId
      in: query
      required: false
      description: Filter results to a single customer under your organisation.
      schema:
        type: string
        format: uuid
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

  schemas:
    CreateSwapRequest:
      type: object
      required: [from, to, amount, destinationAddress, refundTo]
      properties:
        from:
          type: string
          enum: [USDC, EURC]
          example: USDC
          description: Source currency on Solana.
        to:
          type: string
          enum: [USDC, EURC]
          example: EURC
          description: Destination currency on Solana.
        amount:
          type: number
          exclusiveMinimum: 0
          maximum: 1000000000
          example: 100
          description: >
            Human-readable amount. For `exact_input`, amount to send.
            For `exact_output`, amount to receive.
        tradeType:
          type: string
          enum: [exact_input, exact_output]
          default: exact_input
          description: Whether `amount` is the send side or receive side.
        destinationAddress:
          type: string
          minLength: 32
          maxLength: 64
          example: 2dudFU32c5wsRpfRZDXBAJFirHC4hindqpKSCwwtDaAB
          description: Solana address to receive swapped tokens.
        refundTo:
          type: string
          minLength: 32
          maxLength: 64
          example: 2dudFU32c5wsRpfRZDXBAJFirHC4hindqpKSCwwtDaAB
          description: Solana address for Relay refunds (always required).
        customerId:
          type: string
          minLength: 1
          maxLength: 128
          description: Customer under your org. Defaults to the org primary customer.

    Swap:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        customerName:
          type: string
        status:
          type: string
          enum:
            - awaiting_deposit
            - deposit_received
            - swapping
            - completed
            - failed
            - expired
            - cancelled
            - refunded
        from:
          type: string
        to:
          type: string
        tradeType:
          type: string
          enum: [exact_input, exact_output]
        amount:
          type: number
        expectedAmount:
          type: string
          description: Atomic units for the request amount (send or receive per tradeType).
        sendAmount:
          type: string
          nullable: true
          description: Atomic units the payer should send (from Relay quote).
        sendAmountHuman:
          type: number
          nullable: true
        receivedAmount:
          type: string
          nullable: true
        outputAmount:
          type: string
          nullable: true
        rate:
          type: number
          nullable: true
        feeBps:
          type: integer
        depositAddress:
          type: string
          description: Relay Solana deposit address for the origin token.
        relayRequestId:
          type: string
          nullable: true
        relayStatus:
          type: string
          nullable: true
        refundTo:
          type: string
          nullable: true
        originChainId:
          type: integer
          example: 792703809
        destinationAddress:
          type: string
        depositTxHash:
          type: string
          nullable: true
        inTxHashes:
          type: array
          items: { type: string }
        outTxHashes:
          type: array
          items: { type: string }
        errorMessage:
          type: string
          nullable: true
          description: Human-readable failure/refund reason when terminal.
        expiresAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        expectedOutput:
          type: number
          nullable: true
        receivedOutput:
          type: number
          nullable: true

    SuccessEnvelope:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          nullable: true

    ErrorEnvelope:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
        errors:
          type: object
          additionalProperties: true
          description: Present on 422 validation errors (Zod field messages).

    CreateOfframpRequest:
      type: object
      required: [customerId, amount, rate, reference, returnAddress, recipient]
      properties:
        customerId:
          type: string
        amount:
          type: string
        rate:
          type: string
        reference:
          type: string
        returnAddress:
          type: string
        token:
          type: string
          default: USDC
        network:
          type: string
          default: base
        recipient:
          type: object
          required: [institution, accountIdentifier, accountName, currency]
          properties:
            institution:
              type: string
            accountIdentifier:
              type: string
            accountName:
              type: string
            currency:
              type: string
            memo:
              type: string
            providerId:
              type: string

    CreateOnrampRequest:
      type: object
      required:
        [
          customerId,
          amount,
          destinationAddress,
          destinationAddressType,
          refundAccount,
        ]
      properties:
        customerId:
          type: string
        amount:
          type: string
        amountIn:
          type: string
        sourceCurrency:
          type: string
          default: NGN
        reference:
          type: string
        destinationAddress:
          type: string
        destinationAddressType:
          type: string
          enum: [liquidation_address, main_wallet]
        destinationNetwork:
          type: string
          default: base
        destinationCurrency:
          type: string
          default: USDC
        refundAccount:
          type: object
          required: [institution, accountIdentifier, accountName]
          properties:
            institution:
              type: string
            accountIdentifier:
              type: string
            accountName:
              type: string

    CreatePaymentRouteRequest:
      type: object
      required:
        [
          name,
          originChainKey,
          destinationChainKey,
          destinationCurrency,
          destinationAddress,
        ]
      description: >
        Specify networks with `originChainKey` / `destinationChainKey`. Use token codes like `USDC`
        for `destinationCurrency`.
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 80
        originChainKey:
          type: string
          description: Origin network key from `GET /payment-routes/chains` (e.g. `tron`, `bitcoin`).
        originCurrency:
          type: string
          minLength: 2
          maxLength: 128
          description: Optional token code on the origin network.
        destinationChainKey:
          type: string
          description: Settlement network — `base` or `solana`.
        destinationCurrency:
          type: string
          minLength: 2
          maxLength: 128
          description: Token code — `USDC` or `USDT`.
        destinationAddress:
          type: string
          minLength: 8
          maxLength: 128
        refundTo:
          type: string
          minLength: 8
          maxLength: 128
        strict:
          type: boolean
          default: false
        customerId:
          type: string
          minLength: 1
          maxLength: 128
        payerSource:
          type: string
          enum: [wallet, exchange]

    CollectionPricingType:
      type: string
      enum: [fixed, open]

    CollectionLinkMode:
      type: string
      enum: [invoice, checkout]
      description: |
        invoice — single-use link; one id tracks one payment (default).
        checkout — reusable parent URL; each payer quote creates a session child; parent stays active.

    PayerFieldKey:
      type: string
      enum: [name, email, phone, kyc, metadata]

    PayerFieldConfig:
      type: object
      required: [key, required]
      properties:
        key:
          $ref: "#/components/schemas/PayerFieldKey"
        required:
          type: boolean
          default: false
        label:
          type: string
          minLength: 1
          maxLength: 120
          description: Required for `metadata` fields — the prompt shown to the payer (e.g. Tax ID).

    PayerKycDetails:
      type: object
      properties:
        documentType:
          type: string
          maxLength: 64
        documentNumber:
          type: string
          maxLength: 128
        country:
          type: string
          maxLength: 64

    PayerDetails:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
        email:
          type: string
          maxLength: 254
        phone:
          type: string
          maxLength: 32
        kyc:
          $ref: "#/components/schemas/PayerKycDetails"
        metadata:
          type: object
          additionalProperties:
            type: string
            maxLength: 500
          description: Custom field values keyed by the label configured on the link.

    CollectionSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        sendAmount:
          type: number
          nullable: true
        receiveAmount:
          type: number
          nullable: true
        receivedAmountOut:
          type: string
          nullable: true
        originSymbol:
          type: string
          nullable: true
        payerDetails:
          $ref: "#/components/schemas/PayerDetails"
          nullable: true
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    EmbedLabels:
      type: object
      properties:
        continueButton:
          type: string
        sentButton:
          type: string
        checkAgainButton:
          type: string
        modalTitle:
          type: string

    EmbedConfig:
      type: object
      properties:
        layout:
          type: string
          enum: [default, minimal, compact]
          default: default
        accentColor:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        backgroundColor:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        textColor:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        mutedTextColor:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        borderColor:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        borderRadius:
          type: integer
          minimum: 0
          maximum: 32
        fontFamily:
          type: string
        hideBrandFooter:
          type: boolean
        hideStepIndicator:
          type: boolean
        hideMerchantBanner:
          type: boolean
        labels:
          $ref: "#/components/schemas/EmbedLabels"

    UpdateEmbedConfigRequest:
      type: object
      required: [embedConfig]
      properties:
        embedConfig:
          oneOf:
            - $ref: "#/components/schemas/EmbedConfig"
            - type: "null"

    PayQuoteRequest:
      type: object
      required: [originChainKey, originCurrency]
      properties:
        originChainKey:
          type: string
          description: Origin network key from pay options (e.g. `tron`, `bitcoin`).
        originCurrency:
          type: string
          description: Token code on the origin network (e.g. `USDT`).
        payerSource:
          type: string
          enum: [wallet, exchange]
          default: wallet
        paymentMethod:
          type: string
          enum: [deposit, connected_wallet]
          default: deposit
        refundTo:
          type: string
          minLength: 8
          maxLength: 128
          description: Required when `paymentMethod` is `deposit`.
        walletAddress:
          type: string
          minLength: 8
          maxLength: 128
          description: Required when `paymentMethod` is `connected_wallet`.
        payerDetails:
          $ref: "#/components/schemas/PayerDetails"
          description: >
            Collected payer information. Required fields must be present when the link
            configures `payerFields` with `required: true`.

    CreateCollectionRequest:
      type: object
      required: [destinationChainKey, destinationCurrency, destinationAddress]
      description: >
        Specify settlement with `destinationChainKey`. Use token codes like `USDC` for
        `destinationCurrency`.
      properties:
        linkMode:
          $ref: "#/components/schemas/CollectionLinkMode"
          default: invoice
        pricingType:
          $ref: "#/components/schemas/CollectionPricingType"
          default: fixed
        amount:
          type: number
          exclusiveMinimum: 0
          description: Required when pricingType is fixed; omit for open links.
        destinationChainKey:
          type: string
          description: Settlement network — `base` or `solana`.
        destinationCurrency:
          type: string
          description: Token code — `USDC` or `USDT`.
        destinationAddress:
          type: string
        customerId:
          type: string
        label:
          type: string
        reference:
          type: string
        fromName:
          type: string
          maxLength: 120
          description: Optional payer display name on pay page.
        payeeName:
          type: string
          maxLength: 120
          description: Optional payee display name on pay page.
        payerFields:
          type: array
          maxItems: 12
          items:
            $ref: "#/components/schemas/PayerFieldConfig"
          description: >
            Fields to collect from payers on the pay page before quoting.
            Use `metadata` with a custom `label` for extra prompts (e.g. PO number).
        successRedirectUrl:
          type: string
          format: uri

    UpdateCollectionRequest:
      type: object
      description: Partial update. Set status to cancelled to void an open link. Logo uses POST /collections/{id}/logo (multipart).
      properties:
        label:
          type: string
        reference:
          type: string
        fromName:
          type: string
          nullable: true
        payeeName:
          type: string
          nullable: true
        successRedirectUrl:
          type: string
          format: uri
          nullable: true
        embedConfig:
          $ref: "#/components/schemas/EmbedConfig"
          nullable: true
        status:
          type: string
          enum: [cancelled]
          description: Cancel the link. Cannot be combined with other fields.

    Collection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            [
              active,
              awaiting_origin,
              awaiting_deposit,
              deposit_received,
              completed,
              refunded,
              failed,
              expired,
              cancelled,
            ]
        linkMode:
          $ref: "#/components/schemas/CollectionLinkMode"
        pricingType:
          $ref: "#/components/schemas/CollectionPricingType"
        payerSource:
          type: string
          enum: [wallet, exchange]
        label:
          type: string
          nullable: true
        reference:
          type: string
          nullable: true
        fromName:
          type: string
          nullable: true
        payeeName:
          type: string
          nullable: true
        payerFields:
          type: array
          items:
            $ref: "#/components/schemas/PayerFieldConfig"
          description: Configured fields to collect from payers.
        payerDetails:
          $ref: "#/components/schemas/PayerDetails"
          nullable: true
          description: Values collected from the payer at quote time.
        logoUrl:
          type: string
          format: uri
          nullable: true
        customerId:
          type: string
          format: uuid
        customerName:
          type: string
        sessionCount:
          type: integer
          description: Checkout links only — number of payer sessions.
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/CollectionSession"
          description: Checkout link detail only — recent payer sessions.
        receiveAmount:
          type: number
          nullable: true
        receiveAmountAtomic:
          type: string
          nullable: true
        sendAmount:
          type: number
          nullable: true
        amount:
          type: number
          nullable: true
        amountAtomic:
          type: string
          nullable: true
        origin:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/NetworkEndpoint"
        destination:
          $ref: "#/components/schemas/NetworkEndpoint"
        expectedAmountOut:
          type: string
          nullable: true
        receivedAmountOut:
          type: string
          nullable: true
        refundTo:
          type: string
          nullable: true
        depositAddress:
          type: string
          nullable: true
        relayRequestId:
          type: string
          nullable: true
        relayStatus:
          type: string
          nullable: true
        depositTxHash:
          type: string
          nullable: true
        inTxHashes:
          type: array
          items:
            type: string
        outTxHashes:
          type: array
          items:
            type: string
        failReason:
          type: string
          nullable: true
        successRedirectUrl:
          type: string
          format: uri
          nullable: true
        payUrl:
          type: string
          format: uri
        embedUrl:
          type: string
          format: uri
        embedConfig:
          $ref: "#/components/schemas/EmbedConfig"
        quoteValidUntil:
          type: string
          format: date-time
          nullable: true
          description: When the current fixed-price quote expires. Re-quote after this time.
        quotedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TokenCode:
      type: object
      properties:
        symbol:
          type: string
        code:
          type: string

    NetworkEndpoint:
      type: object
      properties:
        key:
          type: string
        network:
          type: string
        symbol:
          type: string
        address:
          type: string
        acceptableTokens:
          type: array
          items:
            $ref: "#/components/schemas/TokenCode"

    DiscoveryNetwork:
      type: object
      required: [key, network, addressFormat, tokens]
      properties:
        key:
          type: string
          description: Use as `originChainKey` or `destinationChainKey` when creating a route or link.
        network:
          type: string
          description: Human-readable network name (Bitcoin, Ethereum, Base, Solana, …).
        addressFormat:
          type: string
          enum: [evm, solana, bitcoin, tron]
        minDepositUsd:
          type: number
        tokens:
          type: array
          description: Token symbols payers can send (origins) or you can receive (settlements).
          items:
            type: string
          example: [USDT, USDC, ETH]

    DiscoveryNetworks:
      type: object
      required: [origins, settlements, routing]
      properties:
        origins:
          type: array
          description: Networks your payers can send crypto from.
          items:
            $ref: "#/components/schemas/DiscoveryNetwork"
        settlements:
          type: array
          description: Networks where you receive stablecoins (Base or Solana).
          items:
            $ref: "#/components/schemas/DiscoveryNetwork"
        routing:
          type: array
          description: Grouped pay-in options — one entry per origin token with nested settlement choices.
          items:
            $ref: "#/components/schemas/OriginRouting"

    SettlementRoute:
      type: object
      required: [key, network, tokens]
      properties:
        key:
          type: string
        network:
          type: string
        tokens:
          type: array
          items:
            type: string

    OriginRouting:
      type: object
      required: [key, network, token, settlements]
      properties:
        key:
          type: string
          description: Origin network key for `originChainKey`.
        network:
          type: string
        token:
          type: string
        settlements:
          type: array
          items:
            $ref: "#/components/schemas/SettlementRoute"

    RoutingDiscovery:
      type: object
      required: [routing]
      properties:
        routing:
          type: array
          items:
            $ref: "#/components/schemas/OriginRouting"

    CurrencyConfigDiscovery:
      $ref: "#/components/schemas/DiscoveryNetworks"

    DepositLeg:
      type: object
      properties:
        network:
          type: string
          nullable: true
        symbol:
          type: string
          nullable: true

    PaymentRouteDeposit:
      type: object
      properties:
        id:
          type: string
          format: uuid
        paymentRouteId:
          type: string
          format: uuid
        routeName:
          type: string
          nullable: true
        relayRequestId:
          type: string
          nullable: true
        status:
          type: string
        origin:
          $ref: "#/components/schemas/DepositLeg"
        destination:
          $ref: "#/components/schemas/DepositLeg"
        amountIn:
          type: string
          nullable: true
        amountInUsd:
          type: string
          nullable: true
        amountOut:
          type: string
          nullable: true
        amountOutUsd:
          type: string
          nullable: true
        depositTxHash:
          type: string
          nullable: true
        inTxHashes:
          type: array
          items:
            type: string
        outTxHashes:
          type: array
          items:
            type: string
        failReason:
          type: string
          nullable: true
        relayUpdatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    SyncDepositsResult:
      type: object
      properties:
        synced:
          type: integer
        routeId:
          type: string
          format: uuid

    PayOption:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        originNetworkKey:
          type: string
        originNetwork:
          type: string
        originSymbol:
          type: string
        addressFormat:
          type: string
          enum: [evm, solana, bitcoin, tron]
        minDepositUsd:
          type: number

    PayPageRecoveryInfo:
      type: object
      properties:
        message:
          type: string
        recoveryUrl:
          type: string
          format: uri

    PayPage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        linkMode:
          $ref: "#/components/schemas/CollectionLinkMode"
        checkoutLinkId:
          type: string
          format: uuid
          nullable: true
        embedConfig:
          $ref: "#/components/schemas/EmbedConfig"
        pricingType:
          $ref: "#/components/schemas/CollectionPricingType"
        payerSource:
          type: string
          enum: [wallet, exchange]
        paymentMethod:
          type: string
          enum: [deposit, connected_wallet]
        supportsConnectedWallet:
          type: boolean
          description: True when the pay page offers connect wallet (EVM and Solana fixed-amount only).
        label:
          type: string
          nullable: true
        fromName:
          type: string
          nullable: true
        payeeName:
          type: string
          nullable: true
        payerFields:
          type: array
          items:
            $ref: "#/components/schemas/PayerFieldConfig"
        payerDetails:
          $ref: "#/components/schemas/PayerDetails"
          nullable: true
        logoUrl:
          type: string
          format: uri
          nullable: true
        receiveAmount:
          type: number
          nullable: true
        sendAmount:
          type: number
          nullable: true
        amount:
          type: number
          nullable: true
        origin:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/NetworkEndpoint"
        destination:
          $ref: "#/components/schemas/NetworkEndpoint"
        payOptions:
          type: array
          items:
            $ref: "#/components/schemas/PayOption"
        originSelected:
          type: boolean
        quoted:
          type: boolean
        needsOriginSelection:
          type: boolean
        canChangeOrigin:
          type: boolean
        expectedAmountOut:
          type: string
          nullable: true
        receivedAmountOut:
          type: string
          nullable: true
        refundTo:
          type: string
          nullable: true
        depositAddress:
          type: string
          nullable: true
        relayStatus:
          type: string
          nullable: true
        failReason:
          type: string
          nullable: true
        depositTxHash:
          type: string
          nullable: true
        successRedirectUrl:
          type: string
          format: uri
          nullable: true
        quoteValidUntil:
          type: string
          format: date-time
          nullable: true
          description: When the current fixed-price quote expires. Re-quote after this time.
        quotedAt:
          type: string
          format: date-time
          nullable: true
        quoteExpired:
          type: boolean
        isOpenAmount:
          type: boolean
        completedAt:
          type: string
