openapi: 3.1.0
info:
  title: RemitFlex API
  version: 1.0.0
  description: |
    Programmatic access to RemitFlex swaps, payment routes, rates, customers, and transactions.

    **Dashboard:** Create API keys at https://dashboard.remitflex.io

    **Authentication:** Send your API key as `Authorization: Bearer rmf_live_...` or `rmf_test_...`.

    **Idempotency:** Mutating requests (`POST`, `PUT`, `PATCH`, `DELETE`) require an `Idempotency-Key` header when authenticated with an API key.

servers:
  - url: https://api.remitflex.io/v1
    description: Production
  - url: http://localhost:4000/v1
    description: Local development

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      description: |
        API key created in the RemitFlex Dashboard at dashboard.remitflex.io (`rmf_live_...` or `rmf_test_...`).
        Key management endpoints require a dashboard JWT and are not part of this reference.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique key for safe retries on mutating API-key requests. Cached for 24 hours per org, method, and path.
      schema:
        type: string
        maxLength: 255
        example: 7f3c2a1b-4e5d-6c7b-8a9f-0e1d2c3b4a5f

    CustomerIdQuery:
      name: customerId
      in: query
      required: false
      description: Filter results to a single customer under your organisation.
      schema:
        type: string
        format: uuid
        example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data:
          nullable: true

    ErrorEnvelope:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
        errors:
          type: object
          additionalProperties: true
          description: Present on 422 validation errors (Zod field messages).

    CreateSwapRequest:
      type: object
      required: [from, to, amount, destinationAddress]
      properties:
        from:
          type: string
          minLength: 2
          maxLength: 10
          example: USDC
          description: Source currency code.
        to:
          type: string
          minLength: 2
          maxLength: 10
          example: EURC
          description: Destination currency code.
        amount:
          type: number
          exclusiveMinimum: 0
          maximum: 1000000000
          example: 100
          description: Human-readable input amount.
        destinationAddress:
          type: string
          minLength: 32
          maxLength: 64
          example: 2dudFU32c5wsRpfRZDXBAJFirHC4hindqpKSCwwtDaAB
          description: Solana address to receive swapped tokens.
        customerId:
          type: string
          minLength: 1
          maxLength: 128
          description: Customer under your org. Defaults to the org primary customer.

    Swap:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        customerName:
          type: string
        status:
          type: string
          enum:
            - awaiting_deposit
            - deposit_received
            - swapping
            - completed
            - failed
            - expired
            - cancelled
        from:
          type: string
        to:
          type: string
        amount:
          type: number
        expectedAmount:
          type: string
          description: Atomic units expected on deposit.
        receivedAmount:
          type: string
          nullable: true
        outputAmount:
          type: string
          nullable: true
        rate:
          type: number
          nullable: true
        feeBps:
          type: integer
        depositAddress:
          type: string
          description: SPL token account (ATA) to deposit to.
        depositWallet:
          type: string
        destinationAddress:
          type: string
        swapTxSignature:
          type: string
          nullable: true
        payoutTxSignature:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
          description: >
            Human-readable failure reason when status is `failed`. Raw Solana simulation
            logs and program errors are never returned — only safe messages suitable for
            end users and reconciliation UIs.
        expiresAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        expectedOutput:
          type: number
          nullable: true
        receivedOutput:
          type: number
          nullable: true

    CreatePaymentRouteRequest:
      type: object
      required: [name, originChainId, destinationChainId, destinationCurrency, destinationAddress]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 80
        originChainId:
          type: integer
          minimum: 1
        originCurrency:
          type: string
          minLength: 4
          maxLength: 128
        destinationChainId:
          type: integer
          minimum: 1
        destinationCurrency:
          type: string
          minLength: 4
          maxLength: 128
        destinationAddress:
          type: string
          minLength: 8
          maxLength: 128
        refundTo:
          type: string
          minLength: 8
          maxLength: 128
        strict:
          type: boolean
          default: false
        customerId:
          type: string
          minLength: 1
          maxLength: 128

    PaymentRoute:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, paused, archived]
        customerId:
          type: string
        customerName:
          type: string
        origin:
          type: object
        destination:
          type: object
        refundTo:
          type: string
          nullable: true
        depositAddress:
          type: string
        relayRequestId:
          type: string
          nullable: true
        strict:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateCustomerRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 255
        type:
          type: string
          enum: [individual, business]
          default: individual

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        type:
          type: string
        isPrimary:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

