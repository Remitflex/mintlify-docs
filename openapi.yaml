paths:
  /customers:
    get:
      operationId: listCustomers
      summary: List customers
      description: Requires `transfers:read` scope.
      tags: [Customers]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ListCustomers"
    post:
      operationId: createCustomer
      summary: Create customer
      description: Requires `transfers:write` scope and `Idempotency-Key`.
      tags: [Customers]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          $ref: "#/components/responses/Customer"

  /transactions:
    get:
      operationId: listTransactions
      summary: List transactions
      description: Unified ledger of payment-route deposits. Optionally filter by `customerId`. Requires `transfers:read` scope.
      tags: [Transactions]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerIdQuery"
      responses:
        "200":
          $ref: "#/components/responses/ListTransactions"

  /payment-routes/chains:
    get:
      operationId: listPaymentRouteChains
      summary: List supported networks
      description: >
        Returns **origins** (networks payers can send from, with accepted tokens) and
        **settlements** (Base or Solana, with USDC/USDT/EURC). Requires `collections:read` scope.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ChainsDiscovery"

  /payment-routes/corridors:
    get:
      operationId: listPaymentRouteCorridors
      summary: List routing options
      description: >
        Returns grouped `routing` only — same array included on `GET /chains`.
        Requires `collections:read` scope.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/CorridorsDiscovery"

  /payment-routes/currencies:
    get:
      operationId: getPaymentRouteCurrencyConfig
      summary: Get origins, settlements, and routing
      description: >
        Same response as `/payment-routes/chains`. Requires `collections:read` scope.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/CurrencyConfigDiscovery"

  /payment-routes:
    get:
      operationId: listPaymentRoutes
      summary: List payment routes
      description: Requires `collections:read` scope.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ListPaymentRoutes"
    post:
      operationId: createPaymentRoute
      summary: Create payment route
      description: Creates a cross-chain payment route. Requires `collections:write` scope and `Idempotency-Key`.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRouteRequest"
      responses:
        "201":
          $ref: "#/components/responses/PaymentRoute"

  /payment-routes/deposits:
    get:
      operationId: listAllPaymentRouteDeposits
      summary: List all deposits
      description: Requires `collections:read` scope.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ListDeposits"

  /payment-routes/{id}:
    get:
      operationId: getPaymentRoute
      summary: Get payment route
      description: Requires `collections:read` scope.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          $ref: "#/components/responses/PaymentRoute"
        "404":
          description: Not found
          content:
            application/json:
              examples:
                error:
                  value:
                    status: error
                    message: Payment route not found
    delete:
      operationId: archivePaymentRoute
      summary: Archive payment route
      description: Requires `collections:write` scope and `Idempotency-Key`.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          $ref: "#/components/responses/PaymentRoute"

  /payment-routes/{id}/deposits:
    get:
      operationId: listPaymentRouteDeposits
      summary: List route deposits
      description: Requires `collections:read` scope.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          $ref: "#/components/responses/ListDeposits"

  /payment-routes/{id}/deposits/sync:
    post:
      operationId: syncPaymentRouteDeposits
      summary: Sync route deposits
      description: Pulls latest deposit state for the route. Requires `collections:write` scope and `Idempotency-Key`.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          $ref: "#/components/responses/SyncDeposits"

  /payment-routes/{id}/pause:
    post:
      operationId: pausePaymentRoute
      summary: Pause payment route
      description: Requires `collections:write` scope and `Idempotency-Key`.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          $ref: "#/components/responses/PaymentRoute"

  /collections/chains:
    get:
      operationId: listCollectionChains
      summary: List payment link chains
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ChainsDiscovery"

  /collections/corridors:
    get:
      operationId: listCollectionCorridors
      summary: List supported payment paths
      description: Same payment paths as `/payment-routes/corridors`. Requires `collections:read` scope.
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          $ref: "#/components/responses/CorridorsDiscovery"

  /collections:
    get:
      operationId: listCollections
      summary: List payment links
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerIdQuery"
      responses:
        "200":
          $ref: "#/components/responses/ListCollections"
    post:
      operationId: createCollection
      summary: Create payment link
      description: Creates a payment link. Set linkMode to invoice (one payment) or checkout (reusable URL with per-payer sessions). Merchant sets destination only; payer selects origin on the pay page. Requires collections:write and Idempotency-Key.
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCollectionRequest"
            examples:
              invoice:
                $ref: "#/components/examples/CreateCollectionInvoiceRequest"
              checkout:
                $ref: "#/components/examples/CreateCollectionCheckoutRequest"
      responses:
        "201":
          $ref: "#/components/responses/Collection"

  /collections/{id}:
    get:
      operationId: getCollection
      summary: Get payment link
      description: Returns invoice state, or checkout parent with sessions array and sessionCount.
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          $ref: "#/components/responses/Collection"

    patch:
      operationId: updateCollection
      summary: Update payment link
      description: "Update metadata, embed theme, or cancel (status cancelled). Logo is uploaded separately via POST /collections/{id}/logo. Requires collections:write."
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCollectionRequest"
      responses:
        "200":
          $ref: "#/components/responses/Collection"

  /collections/{id}/sync:
    post:
      operationId: syncCollection
      summary: Sync payment link status
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          $ref: "#/components/responses/CollectionSync"

  /collections/{id}/cancel:
    post:
      operationId: cancelCollection
      summary: Cancel payment link
      description: 'Legacy alias. Prefer PATCH /collections/{id} with `{ "status": "cancelled" }`.'
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          $ref: "#/components/responses/Collection"

  /collections/{id}/logo:
    post:
      operationId: uploadCollectionLogo
      summary: Upload payment link logo
      description: Multipart upload (`logo` field). PNG, JPEG, or WebP; max 2 MB. SVG is not allowed. Requires `collections:write`.
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [logo]
              properties:
                logo:
                  type: string
                  format: binary
      responses:
        "200":
          $ref: "#/components/responses/LogoUpload"

  /collections/{id}/embed-config:
    patch:
      operationId: updateCollectionEmbedConfig
      summary: Update embed widget theme
      description: 'Legacy alias. Prefer PATCH /collections/{id} with `{ "embedConfig": { ... } }`.'
      tags: [Payment links]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmbedConfigRequest"
      responses:
        "200":
          $ref: "#/components/responses/Collection"

  /pay/{id}/embed-config:
    get:
      operationId: getPayEmbedConfig
      summary: Public embed theme for a payment link
      description: No authentication. Returns resolved embed theme (checkout sessions inherit parent link theme).
      tags: [Payment links]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          $ref: "#/components/responses/PayEmbedConfig"

  /pay/{id}:
    get:
      operationId: getPayPage
      summary: Public pay page data
      description: No authentication. Returns payer-facing payment details.
      tags: [Payment links]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          $ref: "#/components/responses/PayPage"

  /pay/{id}/logo:
    get:
      operationId: getPayLogo
      summary: Public payment link logo
      description: No authentication. Returns the uploaded logo image.
      tags: [Payment links]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Logo image
          content:
            image/*:
              schema:
                type: string
                format: binary

  /pay/{id}/quote:
    post:
      operationId: quotePayPage
      summary: Quote pay page payment
      description: Payer selects origin chain, token, and return address. Returns deposit address and send amount. Hosted pay page sends payerSource wallet. No authentication.
      tags: [Payment links]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PayQuoteRequest"
            examples:
              deposit:
                $ref: "#/components/examples/PayQuoteRequestExample"
      responses:
        "200":
          $ref: "#/components/responses/PayPage"

  /api-keys/publishable:
    post:
      operationId: createPublishableKey
      summary: Create publishable API key
      description: Dashboard JWT only. Browser-safe key for payment link embeds. Issued with `collections:read` only (no write).
      tags: [API keys]
      security: []
      responses:
        "201":
          $ref: "#/components/responses/PublishableKey"

  /payment-routes/{id}/activate:
    post:
      operationId: activatePaymentRoute
      summary: Activate payment route
      description: Requires `collections:write` scope and `Idempotency-Key`.
      tags: [Payment routes]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
