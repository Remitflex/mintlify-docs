  /rails/banks:
    get:
      operationId: listRailsOfframpBanks
      summary: List supported NGN offramp banks
      description: |
        Nigerian banks supported for cNGN → NGN offramps and account-name
        resolution (intersection of StRails NIBSS banks and PayCrest
        institutions). Use `bankCode` values here for `resolve-account` and
        `POST /rails/offramps`. Requires `transfers:read`.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Offramp banks fetched
          content:
            application/json:
              example:
                banks:
                  - name: GTBank
                    bankCode: "058"
                total: 1

  /rails/offramps/resolve-account:
    post:
      operationId: resolveRailsOfframpAccount
      summary: Resolve NGN offramp account name
      description: |
        Resolves the account holder name for a Nigerian bank account via
        PayCrest `verify-account`, keyed by a `bankCode` from
        `GET /rails/banks`. Returns `422` if the account cannot be verified or
        the bank is unsupported. Requires `transfers:read`.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountNumber, bankCode]
              properties:
                accountNumber:
                  type: string
                bankCode:
                  type: string
            example:
              accountNumber: "0123456789"
              bankCode: "058"
      responses:
        "200":
          description: Account resolved
          content:
            application/json:
              example:
                accountName: JOHN DOE
                bankName: GTBank
                bankCode: "058"
        "422":
          description: Account could not be verified

  /rails/offramps:
    get:
      operationId: listRailsOfframps
      summary: List NGN rails user offramps
      description: User cNGN → NGN bank offramps (not PayCrest `/offramps`). Requires `transfers:read`.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Rails offramps fetched
    post:
      operationId: createRailsOfframp
      summary: Create NGN rails user offramp
      description: |
        Offramps cNGN from the user Smart Wallet to a Nigerian bank (`/cngnofframp`).
        `amount` is in Naira. Requires `transfers:write` and `Idempotency-Key`.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, accountNumber, bankCode]
              properties:
                customerId:
                  type: string
                  format: uuid
                amount:
                  type: number
                  description: Amount in Naira
                accountNumber:
                  type: string
                bankCode:
                  type: string
                ticker:
                  type: string
                  enum: [CNGN, USDC, USDT]
                  default: CNGN
            example:
              amount: 5000
              accountNumber: "0123456789"
              bankCode: "058"
              ticker: CNGN
      responses:
        "201":
          description: Rails offramp created

  /rails/offramps/{id}:
    get:
      operationId: getRailsOfframp
      summary: Get NGN rails user offramp
      description: Requires `transfers:read`. Syncs StRails offramp status on read by default.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sync
          in: query
          schema:
            type: string
            enum: ["true", "false", "0", "1"]
      responses:
        "200":
          description: Rails offramp fetched
        "404":
          description: Not found

  /rails/onramps:
    get:
      operationId: listRailsOnramps
      summary: List NGN rails temporary VA onramps
      description: Requires `transfers:read`.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Rails onramps fetched
    post:
      operationId: createRailsOnramp
      summary: Create temporary VA onramp
      description: |
        Creates a StRails temporary virtual account for a fixed NGN amount (~30 min TTL).
        Third-party deposits are accepted. Default `sweepToOfframp=true` moves minted
        tokens to the customer's permanent Smart Wallet. Requires `transfers:write`.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                customerId:
                  type: string
                  format: uuid
                amount:
                  type: number
                  exclusiveMinimum: 0
                sweepToOfframp:
                  type: boolean
                  default: true
                autoSwap:
                  type: boolean
                  default: false
                assetSwap:
                  type: string
                  enum: [USDC, USDT]
                owner:
                  type: string
                destinationAddress:
                  type: string
            example:
              amount: 5000
              sweepToOfframp: true
              autoSwap: false
      responses:
        "201":
          description: Rails onramp created

  /rails/onramps/{id}:
    get:
      operationId: getRailsOnramp
      summary: Get NGN rails temporary VA onramp
      description: Requires `transfers:read`. Syncs StRails onramp status on read by default. Response includes live `sweep` (temp vs main wallet balances / consolidate eligibility).
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: sync
          in: query
          schema:
            type: string
            enum: ["true", "false", "0", "1"]
      responses:
        "200":
          description: Rails onramp fetched
        "404":
          description: Not found

  /rails/onramps/{id}/consolidate:
    post:
      operationId: consolidateRailsOnramp
      summary: Force-move temp VA funds to main Smart Wallet
      description: |
        When StRails auto-sweep stalls after a temporary VA onramp, withdraws
        remaining cNGN from the generated temporary wallet into the customer's
        linked permanent Smart Wallet. Requires `transfers:write`.

        Success is not inferred from a mined StRails hash alone: RemitFlex
        re-reads the temporary wallet balance and prefers on-chain Transfer
        verification. Response `message` and `onramp.sweep.consolidate.status`
        may be `completed`, `incomplete` (retryable), `submitted`, or `failed`.
      tags: [NGN rails]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Consolidate withdrawal submitted
        "422":
          description: Nothing to move or wallets not ready
        "404":
          description: Not found
