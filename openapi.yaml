paths:
  /rates:
    get:
      operationId: listRates
      summary: List exchange rates
      description: Returns cached FX rates for all configured swap pairs. Requires `fx:read` scope.
      tags: [Rates]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Rates fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          chain: { type: string }
                          updatedAt: { type: string, nullable: true }
                          refreshing: { type: boolean }
                          rates: { type: array, items: { type: object } }
              examples:
                success:
                  $ref: "#/components/examples/ListRatesResponse"
        "401":
          description: Invalid or missing API key
          content:
            application/json:
              examples:
                error:
                  $ref: "#/components/examples/ErrorResponse"
        "403":
          description: Missing required scope

  /rates/currencies:
    get:
      operationId: listRateCurrencies
      summary: List currencies and pairs
      description: Returns supported currencies and swap pairs. Requires `fx:read` scope.
      tags: [Rates]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Currencies fetched
          content:
            application/json:
              examples:
                success:
                  $ref: "#/components/examples/ListCurrenciesResponse"

  /rates/{from}/{to}:
    get:
      operationId: getPairRate
      summary: Get pair rate
      description: Returns the cached rate for a single currency pair. Requires `fx:read` scope.
      tags: [Rates]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: from
          in: path
          required: true
          schema:
            type: string
          example: USDC
        - name: to
          in: path
          required: true
          schema:
            type: string
          example: EURC
      responses:
        "200":
          description: Rate fetched
          content:
            application/json:
              examples:
                success:
                  $ref: "#/components/examples/PairRateResponse"
        "503":
          description: Rate not available yet
          content:
            application/json:
              examples:
                error:
                  value:
                    status: error
                    message: Rate for USDC/EURC not available yet. Try again shortly.

  /swaps:
    get:
      operationId: listSwaps
      summary: List swaps
      description: Returns up to 50 swaps for your organisation, newest first. Optionally filter by `customerId`. Requires `transfers:read` scope.
      tags: [Swaps]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerIdQuery"
      responses:
        "200":
          description: Swaps fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          swaps:
                            type: array
                            items:
                              $ref: "#/components/schemas/Swap"
                          total:
                            type: integer
              examples:
                success:
                  $ref: "#/components/examples/ListSwapsResponse"
    post:
      operationId: createSwap
      summary: Create swap
      description: |
        Creates a Solana stablecoin swap and returns a deposit address. Deposit the `from` token to `depositAddress` before expiry.
        Tied to `customerId` (defaults to org primary customer). Requires `transfers:write` scope and an `Idempotency-Key` header.
      tags: [Swaps]
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSwapRequest"
      x-codeSamples:
        - lang: bash
          label: curl
          source: |
            curl -X POST https://api.remitflex.io/v1/swaps \
              -H "Authorization: Bearer $REMITFLEX_API_KEY" \
              -H "Idempotency-Key: $(uuidgen)" \
              -H "Content-Type: application/json" \
              -d '{"from":"USDC","to":"EURC","amount":100,"destinationAddress":"2dudFU32c5wsRpfRZDXBAJFirHC4hindqpKSCwwtDaAB"}'
      responses:
        "201":
          description: Swap created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Swap"
              examples:
                success:
                  $ref: "#/components/examples/CreateSwapResponse"
        "400":
          description: Missing Idempotency-Key
          content:
            application/json:
              examples:
                error:
                  value:
                    status: error
                    message: Idempotency-Key header is required for API key requests
        "422":
          description: Validation error or unsupported pair
          content:
            application/json:
              examples:
                error:
                  value:
                    status: error
                    message: Unsupported currency pair

  /swaps/{id}:
    get:
      operationId: getSwap
      summary: Get swap
      description: Requires `transfers:read` scope.
      tags: [Swaps]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Swap fetched
          content:
            application/json:
              examples:
                success:
                  $ref: "#/components/examples/GetSwapResponse"
                failed:
                  $ref: "#/components/examples/GetSwapFailedResponse"
        "404":
          description: Swap not found
          content:
            application/json:
              examples:
                error:
                  value:
                    status: error
                    message: Swap not found

  /swaps/{id}/cancel:
    post:
      operationId: cancelSwap
      summary: Cancel swap
      description: Cancels a swap in `awaiting_deposit` status. Requires `transfers:write` scope and `Idempotency-Key`.
      tags: [Swaps]
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Swap cancelled
          content:
            application/json:
              examples:
                success:
                  $ref: "#/components/examples/CancelSwapResponse"
        "409":
          description: Swap cannot be cancelled in current status
          content:
            application/json:
              examples:
                error:
                  value:
                    status: error
                    message: Swap cannot be cancelled in current status

  /customers:
    get:
      operationId: listCustomers
      summary: List customers
      description: Requires `transfers:read` scope.
      tags: [Customers]
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Customers fetched
          content:
            application/json:
